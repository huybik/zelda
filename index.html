<!-- No errors, looks okay. Minor semantic improvements. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Low-Poly Wilderness Quest</title> <!-- Simplified title -->
    <link rel="stylesheet" href="style.css">
    <!-- Favicon using SVG for simple representation -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌲</text></svg>">
    <meta name="description" content="A simple low-poly adventure game created with Three.js and TypeScript.">
</head>
<body>
    <!-- Game Canvas Container -->
    <div id="game-container" tabindex="0"> <!-- Add tabindex to allow focus for pointer lock -->
        <!-- Renderer canvas will be appended here by JS -->
    </div>

    <!-- UI Overlays Container -->
    <div id="ui-container">

        <!-- Heads-Up Display -->
        <div id="hud">
            <div class="stat-bars">
                <div class="bar-container health-container">
                     <span class="bar-label">Health</span>
                    <div class="bar-background">
                        <div id="health-bar" class="bar health-fill"></div>
                    </div>
                </div>
                <div class="bar-container stamina-container">
                     <span class="bar-label">Stamina</span>
                     <div class="bar-background">
                        <div id="stamina-bar" class="bar stamina-fill"></div>
                    </div>
                </div>
            </div>
            <!-- Interaction prompt positioned separately via CSS -->
            <div id="interaction-prompt" style="display: none;"></div>
        </div>

        <!-- Minimap -->
        <div id="minimap-container">
            <canvas id="minimap-canvas" width="150" height="150">Your browser does not support the canvas element.</canvas>
        </div>

        <!-- Inventory Panel -->
        <div id="inventory-display" class="ui-panel hidden" aria-hidden="true" role="dialog" aria-labelledby="inventory-title">
            <h2 id="inventory-title">Inventory (I)</h2>
            <div id="inventory-slots" role="grid" aria-label="Inventory items">
                <!-- Slots generated by JS/TS -->
            </div>
            <!-- <button class="close-button" aria-label="Close Inventory">X</button> -->
        </div>

         <!-- Journal Panel -->
         <div id="journal-display" class="ui-panel hidden" aria-hidden="true" role="dialog" aria-labelledby="journal-title">
            <h2 id="journal-title">Journal (J)</h2>
            <div class="journal-content">
                <section class="journal-section quests-section">
                    <h3>Quest Log</h3>
                    <ul id="quest-log" aria-label="Current quests"></ul>
                </section>
                <section class="journal-section events-section">
                     <h3>Event Log</h3>
                     <ul id="event-log" aria-label="Recent events"></ul>
                </section>
            </div>
             <!-- <button class="close-button" aria-label="Close Journal">X</button> -->
        </div>

    </div> <!-- End ui-container -->

    <!-- Crosshair (Pure CSS) -->
    <div id="crosshair"></div>

    <!-- Game Script -->
    <!-- Make sure the path points to your bundled JS file if using a build process -->
    <!-- If running TS directly via a dev server, this path might be correct -->
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
